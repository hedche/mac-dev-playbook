---
- name: Configure host.
  hosts: all

  vars_files:
    - default.config.yml

  pre_tasks:
    - name: Include playbook configuration.
      include_vars: "{{ item }}"
      with_fileglob:
        - "{{ playbook_dir }}/config.yml"
      tags: ['always']

    - name: Remove stale Docker Desktop symlinks from previous installs.
      become: true
      shell: |
        for dir in \
          /usr/local/bin \
          /usr/local/cli-plugins \
          /usr/local/lib/docker/cli-plugins \
          /opt/homebrew/bin \
          /opt/homebrew/cli-plugins \
          /opt/homebrew/lib/docker/cli-plugins
        do
          [ -d "${dir}" ] || continue
          find "${dir}" -maxdepth 1 -type l \
            \( -lname '/Applications/Docker.app' -o -lname '/Applications/Docker.app/*' \) \
            -print -delete
        done
      register: stale_docker_desktop_symlinks
      changed_when: stale_docker_desktop_symlinks.stdout != ""
      when: "'docker-desktop' in homebrew_cask_apps"
      tags: ['homebrew']

  roles:
    - role: elliotweiser.osx-command-line-tools
    - role: geerlingguy.mac.homebrew
      tags: ['homebrew']
    - role: geerlingguy.dotfiles
      when: configure_dotfiles
      tags: ['dotfiles']
    - role: geerlingguy.mac.mas
      when: mas_installed_apps or mas_installed_app_ids
      tags: ['mas']
    - role: geerlingguy.mac.dock
      when: configure_dock
      tags: ['dock']

  tasks:
    - import_tasks: tasks/sudoers.yml
      when: configure_sudoers
      tags: ['sudoers']

    - import_tasks: tasks/terminal.yml
      when: configure_terminal
      tags: ['terminal']

    - import_tasks: tasks/osx.yml
      when: configure_osx
      tags: ['osx']

    - import_tasks: tasks/oh-my-zsh.yml
      when: configure_oh_my_zsh
      tags: ['oh-my-zsh']

    - import_tasks: tasks/stats.yml
      when: configure_stats
      tags: ['stats']

    - import_tasks: tasks/raycast.yml
      when: configure_raycast
      tags: ['raycast']

    - import_tasks: tasks/git.yml
      when: git_clone
      tags: ['git-clone']

    - name: Set deafult browser to be Arc
      shell: defaultbrowser browser
      ignore_errors: true

    - name: Set wallpaper
      shell: |
        osascript -e "tell application \"Finder\" to set desktop picture to POSIX file \"{{ wallpaper_path }}\""
      when: wallpaper_path is defined
      tags: ['wallpapaer']

    - import_tasks: tasks/extra-packages.yml
      tags: ['extra-packages']

    - name: Run post-provision task files in a block.
      tags: ['post']
      block:
        - name: Run configured post-provision ansible task files.
          include_tasks: "{{ outer_item }}"
          loop_control:
            loop_var: outer_item
          with_fileglob: "{{ post_provision_tasks | default(omit) }}"
